<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>{{TITLE}}</title>
  <style>
    :root{--bg:#0d0c0b;--panel:#191613;--panel2:#211c17;--line:#3b3026;--text:#f1e8dc;--muted:#a99b8b;--gold:#d99a3c;--red:#d85b45;--green:#66b887;--blue:#72a9c9}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#21180f 0,#0d0c0b 42%);color:var(--text);font:14px/1.55 system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif}
    main{max-width:1180px;margin:auto;padding:28px}.hero,.panel{background:linear-gradient(145deg,rgba(34,28,22,.96),rgba(21,18,15,.98));border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 45px rgba(0,0,0,.28)}
    .hero{padding:24px;margin-bottom:18px}.eyebrow{color:var(--gold);font-weight:700;letter-spacing:.08em}.hero h1{margin:4px 0 12px;font-size:30px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{padding:5px 10px;border:1px solid var(--line);border-radius:999px;color:var(--muted);background:#120f0d}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.panel{padding:18px;grid-column:span 6}.panel.wide{grid-column:span 12}.panel h2{font-size:18px;margin:0 0 14px;color:#f4c479}.metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.metric,.item,.issue{background:var(--panel2);border:1px solid #342a22;border-radius:10px;padding:12px}.metric .label,.muted{color:var(--muted)}.metric .value{font-size:20px;font-weight:750;margin-top:2px}.missing{color:#c59b68}.items{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.item h3{margin:0 0 8px;font-size:15px;color:#f1c06e}.affix{color:#ddd0c2;margin:3px 0}.ga{color:#ffe0a1}.tag{display:inline-block;margin-right:5px;padding:1px 6px;border:1px solid #59422d;border-radius:999px;color:#f4c479;font-size:11px}.issues{display:grid;gap:9px}.issue{display:grid;grid-template-columns:120px 80px 1fr;gap:12px;align-items:center}.recommendation{grid-template-columns:140px 1fr}.severity{color:var(--red);font-weight:700}.good{color:var(--green)}details{margin-top:14px}summary{cursor:pointer;color:var(--muted)}pre{white-space:pre-wrap;overflow-wrap:anywhere;background:#0c0a09;padding:12px;border-radius:8px;color:#bfb1a2}.progress{height:8px;background:#0d0b09;border-radius:999px;overflow:hidden;margin-top:8px}.progress>span{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--gold),var(--green))}
    @media(max-width:780px){main{padding:14px}.panel{grid-column:span 12}.metrics,.items{grid-template-columns:1fr}.issue{grid-template-columns:1fr;gap:3px}.hero h1{font-size:24px}}
  </style>
</head>
<body>
<main>{{CONTENT}}</main>
<script type="application/json" id="snapshot-data">{{DATA_JSON}}</script>
</body>
</html>
